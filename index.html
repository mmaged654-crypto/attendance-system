<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance System</title>
<style>
body { font-family: Arial; text-align: center; background:#f5f5f5; }
.container { margin-top: 50px; }
button { padding: 15px 25px; margin: 10px; font-size: 16px; cursor: pointer; border-radius:10px; border:none;}
.checkin { background: green; color:white;}
.checkout { background: red; color:white;}
.admin { background: #333; color:white;}
input { padding:10px; margin:10px; border-radius:8px; border:1px solid #ccc;}
.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h2>Attendance System 🤍</h2>

<div id="userPage">
    <input type="email" id="email" placeholder="Enter your email"><br>

    <button class="checkin" onclick="checkIn()">Check In</button>
    <button class="checkout" onclick="checkOut()">Check Out</button>
</div>

<hr>

<button class="admin" onclick="showAdmin()">Admin Panel</button>

<div id="adminPage" class="hidden">
    <h3>Admin Panel</h3>

    <input type="password" id="adminPass" placeholder="Enter Password">
    <button onclick="loginAdmin()">Login</button>

    <div id="adminControls" class="hidden">

        <h4>Change Sheet URL</h4>
        <input type="text" id="sheetURL"><br>
        <button onclick="saveSheet()">Save</button>

        <h4>Add Employee</h4>
        <input type="email" id="newEmp">
        <button onclick="addEmployee()">Add</button>

        <h4>Change Password</h4>
        <input type="password" id="newPass">
        <button onclick="changePass()">Change</button>

    </div>
</div>

</div>

<script>

// ====== Local Storage ======
let scriptURL = localStorage.getItem("sheetURL") || "";
let adminPassword = localStorage.getItem("adminPass") || "1234";
let employees = JSON.parse(localStorage.getItem("employees") || "[]");

// ====== Attendance ======
function checkIn(){
    let email = document.getElementById("email").value;

    if(!employees.includes(email)){
        alert("❌ مش مسجل كموظف");
        return;
    }

    sendData(email,"Check In");
}

function checkOut(){
    let email = document.getElementById("email").value;

    if(!employees.includes(email)){
        alert("❌ مش مسجل كموظف");
        return;
    }

    sendData(email,"Check Out");
}

function sendData(email,status){
    fetch(scriptURL,{
        method:"POST",
        body: JSON.stringify({email:email, status:status})
    })
    .then(res=>alert("✅ Done"))
    .catch(err=>alert("❌ Error"));
}

// ====== Admin ======
function showAdmin(){
    document.getElementById("adminPage").classList.toggle("hidden");
}

function loginAdmin(){
    let pass = document.getElementById("adminPass").value;

    if(pass === adminPassword){
        document.getElementById("adminControls").classList.remove("hidden");
    } else {
        alert("❌ Wrong Password");
    }
}

function saveSheet(){
    let url = document.getElementById("sheetURL").value;
    localStorage.setItem("sheetURL",url);
    alert("✅ Saved");
}

function addEmployee(){
    let emp = document.getElementById("newEmp").value;

    if(!employees.includes(emp)){
        employees.push(emp);
        localStorage.setItem("employees",JSON.stringify(employees));
        alert("✅ Added");
    }
}

function changePass(){
    let newPass = document.getElementById("newPass").value;
    localStorage.setItem("adminPass",newPass);
    alert("✅ Password Changed");
}

</script>

</body>
</html>
